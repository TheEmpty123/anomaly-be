spring.application.name=BackendJava

# Data Mart (PostgreSQL) connection for FastAPI frontend consumption
# You can override these via environment variables DM_USER, DM_PASSWORD, DM_HOST, DM_PORT, DM_NAME, DM_URL
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DM_URL:jdbc:postgresql://${DM_HOST:localhost}:${DM_PORT:5432}/${DM_NAME:stellar_dm}}
#spring.datasource.username=${DM_USER:api_readonly}     # Production
#spring.datasource.password=${DM_PASSWORD:thisisapassword}
# Dev only
spring.datasource.username=${DM_USER:postgres}
spring.datasource.password=${DM_PASSWORD:1}

# Hikari (connection pool) basic settings
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.pool-name=dm-hikari-pool

# Spring MVC base context
server.port=${SERVER_PORT:8080}

# Redis market data
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
app.market.pubsub-channel=${MARKET_PUBSUB_CHANNEL:market_channel}

# Actuator health endpoint
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Disable Spring Boot Docker Compose integration by default to avoid requiring Docker Desktop to be running
# You can enable it by setting environment variable SPRING_DOCKER_COMPOSE_ENABLED=true
spring.docker.compose.enabled=${SPRING_DOCKER_COMPOSE_ENABLED:false}

# API base paths (can be overridden via env)
api.stellar.base-path=${API_STELLAR_BASE_PATH:/stellar-api/v1}
api.jpa.base-path=${API_JPA_BASE_PATH:/api/jpa}
