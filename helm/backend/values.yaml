nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: localhost:5000/backend
  tag: "1.0.5-1"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

containerPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  SPRING_PROFILES_ACTIVE: prod
  SPRING_DATASOURCE_URL: jdbc:postgresql://192.168.1.19:5432/stellar_dm
  REDIS_HOST: redis
  REDIS_PORT: 6379
  MARKET_PUBSUB_CHANNEL: market_channel
  STELLAR_JWT_ENABLED: "true"
  STELLAR_JWT_ISSUER: stellar-api
  STELLAR_JWT_AUDIENCE: stellar-backend

secret:
  name: backend-db-secret
